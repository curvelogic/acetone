# Build the operator's manual (docs/manual/, mdBook) and publish it to GitHub
# Pages. Per ADR-0047: on pull requests the book build is a CI gate only; on
# push to main it deploys through the Pages API (upload-pages-artifact +
# deploy-pages) — no gh-pages branch, sidestepping the custom-ref-namespace
# 403 recorded in docs/notes/operational-constraints.md.
#
# Two further gates ride alongside the build (both on PRs and on the main
# push before deploy):
#   - linkcheck (acetone-20a, closing ADR-0047 §3's promise): lychee verifies
#     every internal link and anchor in the built book. mdbook-linkcheck was
#     rejected — unmaintained (last release 2022, predates mdbook 0.5) and,
#     as an alternate renderer, it moves the build output under book/html/,
#     breaking the Pages artifact path.
#   - verify manual examples (acetone-4zy.8): docs/manual/verify.sh runs the
#     manual's load-bearing runnable artefacts (asset-registry.sh, the
#     importing chapter's committed data files, the library-api example)
#     against a freshly built acetone binary, asserting outcomes — counts,
#     exit codes, key strings — never verbatim transcripts. It runs
#     unconditionally rather than path-filtered: the CLI's behaviour can
#     change through any workspace crate, so an honest filter would match
#     nearly everything anyway.
#
# One human step: Settings → Pages → Source = GitHub Actions must be enabled
# before the deploy job can publish.

name: docs

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

env:
  MDBOOK_VERSION: 0.5.2
  # sha256 of mdbook-v0.5.2-x86_64-unknown-linux-gnu.tar.gz
  MDBOOK_SHA256: 084e4342ba564db270108763e404a7d1f309d932651a22484e93c0dc1a071f6d
  LYCHEE_VERSION: 0.24.2
  # sha256 of lychee-x86_64-unknown-linux-gnu.tar.gz, verified against the
  # upstream release's published .sha256 asset (lycheeverse/lychee).
  LYCHEE_SHA256: 1f4e0ef7f6554a6ed33dd7ac144fb2e1bbed98598e7af973042fc5cd43951c9a

jobs:
  build:
    name: build manual
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install mdbook
        run: |
          curl -sSfL --retry 3 -o "${RUNNER_TEMP}/mdbook.tar.gz" \
            "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          echo "${MDBOOK_SHA256}  ${RUNNER_TEMP}/mdbook.tar.gz" | sha256sum --check
          mkdir -p "${RUNNER_TEMP}/mdbook-bin"
          tar -xzf "${RUNNER_TEMP}/mdbook.tar.gz" -C "${RUNNER_TEMP}/mdbook-bin"
          echo "${RUNNER_TEMP}/mdbook-bin" >> "${GITHUB_PATH}"

      - name: Build the book
        run: mdbook build docs/manual

      - name: Install lychee
        run: |
          curl -sSfL --retry 3 -o "${RUNNER_TEMP}/lychee.tar.gz" \
            "https://github.com/lycheeverse/lychee/releases/download/lychee-v${LYCHEE_VERSION}/lychee-x86_64-unknown-linux-gnu.tar.gz"
          echo "${LYCHEE_SHA256}  ${RUNNER_TEMP}/lychee.tar.gz" | sha256sum --check
          tar -xzf "${RUNNER_TEMP}/lychee.tar.gz" -C "${RUNNER_TEMP}"
          echo "${RUNNER_TEMP}/lychee-x86_64-unknown-linux-gnu" >> "${GITHUB_PATH}"

      # A dead internal link or anchor fails CI (ADR-0047 §3). --offline
      # confines checking to the local files: external links never touch the
      # network, so the gate cannot flake on somebody else's outage. The
      # generated 404.html is excluded — it links the site root by absolute
      # path (site-url), which only resolves once deployed.
      - name: Check internal links and anchors
        run: |
          lychee --offline --include-fragments --no-progress \
            --exclude-path docs/manual/book/404.html \
            'docs/manual/book/**/*.html'

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/manual/book

  verify-examples:
    # The manual's runnable artefacts, executed against the real binary
    # (acetone-4zy.8). See docs/manual/verify.sh for exactly what is and is
    # not covered. Deploy does not wait on this job: it gates PRs and reports
    # on main, and the book build itself remains the deploy's gate.
    name: verify manual examples
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Build the CLI and the library-api example
        run: |
          cargo build -p acetone-cli --bin acetone
          cargo build -p acetone-core --example manual_library_api
      - name: Verify the manual's examples
        run: docs/manual/verify.sh
        env:
          ACETONE: target/debug/acetone
          EXAMPLE_BIN: target/debug/examples/manual_library_api
          GIT_AUTHOR_NAME: ci
          GIT_AUTHOR_EMAIL: ci@acetone.invalid
          GIT_COMMITTER_NAME: ci
          GIT_COMMITTER_EMAIL: ci@acetone.invalid

  deploy:
    name: deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    concurrency:
      group: github-pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
