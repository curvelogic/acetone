# Build the operator's manual (docs/manual/, mdBook) and publish it to GitHub
# Pages. Per ADR-0047: on pull requests the book build is a CI gate only; on
# push to main it deploys through the Pages API (upload-pages-artifact +
# deploy-pages) — no gh-pages branch, sidestepping the custom-ref-namespace
# 403 recorded in docs/notes/operational-constraints.md.
#
# One human step: Settings → Pages → Source = GitHub Actions must be enabled
# before the deploy job can publish.

name: docs

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

env:
  MDBOOK_VERSION: 0.5.2
  # sha256 of mdbook-v0.5.2-x86_64-unknown-linux-gnu.tar.gz
  MDBOOK_SHA256: 084e4342ba564db270108763e404a7d1f309d932651a22484e93c0dc1a071f6d

jobs:
  build:
    name: build manual
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install mdbook
        run: |
          curl -sSfL --retry 3 -o "${RUNNER_TEMP}/mdbook.tar.gz" \
            "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          echo "${MDBOOK_SHA256}  ${RUNNER_TEMP}/mdbook.tar.gz" | sha256sum --check
          mkdir -p "${RUNNER_TEMP}/mdbook-bin"
          tar -xzf "${RUNNER_TEMP}/mdbook.tar.gz" -C "${RUNNER_TEMP}/mdbook-bin"
          echo "${RUNNER_TEMP}/mdbook-bin" >> "${GITHUB_PATH}"

      - name: Build the book
        run: mdbook build docs/manual

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/manual/book

  deploy:
    name: deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    concurrency:
      group: github-pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
