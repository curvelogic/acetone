name: Release

# Stage a release CANDIDATE. This builds the single static `acetone` binary for
# each supported target and attaches the archives to a *draft* GitHub release
# named for the version in the workspace `Cargo.toml`.
#
# Approval = publishing the draft. The tag `v<version>` is NOT created here;
# GitHub creates it when you publish the draft release, with you as the actor
# (which satisfies the tag-protection ruleset). There is no manual tagging.
#
# Run this from the Actions tab (workflow_dispatch) when a candidate is wanted;
# review the draft's binaries; publish when happy. The release body is the
# curated `## [<version>]` section of CHANGELOG.md (not an auto commit list), so
# that section must exist before cutting a release. The Homebrew formula bump is
# done by hand for the first release (see docs/RELEASING.md); automating it is a
# tracked follow-up (acetone-wpx).
#
# Publishing the library crates to crates.io is a separate, deliberate manual
# step (see docs/RELEASING.md) — it reserves names irreversibly.
#
# Build/release are DECOUPLED: the matrix jobs only upload artifacts, and a
# single final job assembles exactly one draft with every asset. Running the
# release step per-matrix-job would race — GitHub permits multiple *draft*
# releases at the same tag, so parallel softprops calls can create several
# partial drafts.
on:
  workflow_dispatch:

# Only one release run at a time; do not cancel an in-progress one (it may be
# mid-upload to a draft).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - id: v
        # The workspace version is the first top-level `version = "…"` in the
        # root Cargo.toml (under [workspace.package]); the binary inherits it.
        run: |
          version=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          if [ -z "$version" ]; then echo "could not resolve version" >&2; exit 1; fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "Resolved release version: v$version"

  binary:
    name: ${{ matrix.target }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: statically linked against musl — a self-contained binary.
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
          # macOS: the platform binary (fully static is not supported on macOS).
          # Both arches build on the Apple-silicon runner — the macOS SDK ships
          # both slices, so x86_64 is a plain cross-compile (a CLI needs no
          # signing). This avoids depending on an Intel `macos-13` runner, which
          # GitHub is retiring (an unavailable one leaves the job queued forever).
          #
          # Pinned to macos-15, not macos-latest: the `latest` label migrated to
          # macOS 26 (actions/runner-images#14167), and release binaries should
          # not silently change SDK / deployment baseline when GitHub moves the
          # alias. Bump this pin deliberately, as its own reviewed change.
          - os: macos-15 # Apple silicon runner
            target: aarch64-apple-darwin
          - os: macos-15 # Apple silicon runner, cross-compiling to x86_64
            target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - name: Install cross-linker (musl)
        if: contains(matrix.target, 'linux-musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-musl" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          fi
      - name: Build release binary
        run: cargo build --release --locked --bin acetone --target ${{ matrix.target }}
      - name: Package
        # Values are passed through the environment and referenced as bash
        # variables — never interpolated into the script text — so nothing
        # crafted can inject shell. (matrix.target is a static workflow value.)
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          TARGET: ${{ matrix.target }}
        run: |
          staging="acetone-${TAG}-${TARGET}"
          mkdir "$staging"
          cp "target/${TARGET}/release/acetone" "$staging/"
          cp README.md LICENSE-MIT LICENSE-APACHE "$staging/" 2>/dev/null || true
          # Archive the *contents* (binary at the root) so the Homebrew formula
          # is a plain `bin.install "acetone"`.
          tar -C "$staging" -czf "$staging.tar.gz" .
          shasum -a 256 "$staging.tar.gz" > "$staging.tar.gz.sha256"
      - name: Upload build artifacts
        # Hand the archives to the single release job; do NOT touch the draft
        # release here (parallel draft creation races — see header).
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: acetone-${{ matrix.target }}
          path: |
            acetone-*.tar.gz
            acetone-*.tar.gz.sha256
          if-no-files-found: error
          retention-days: 7

  release:
    name: Stage draft release
    needs: [prepare, binary]
    runs-on: ubuntu-latest
    permissions:
      contents: write # create/attach the draft release
    steps:
      # Checkout FIRST — it cleans the workspace, so it must precede the
      # artifact download (which writes into dist/). We need the tree for
      # CHANGELOG.md.
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Download build artifacts
        # v8 verifies the download digest and fails on mismatch by default
        # (digest-mismatch: error) — desirable hardening for release assets.
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true
      - name: Extract release notes from CHANGELOG
        # The release body is the curated CHANGELOG section for this version —
        # not GitHub's auto commit/PR list. Extract the lines under the
        # `## [<version>]` heading up to the next `## [` heading. VERSION comes
        # through the environment (never interpolated into the script text).
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          # Stop at the next version heading (## [..]) or the trailing
          # link-reference-definition block ([label]: url) that Keep a Changelog
          # puts at the foot of the file.
          awk -v tag="## [$VERSION]" '
            index($0, tag) == 1     { found = 1; next }
            found && /^## \[/       { exit }
            found && /^\[[^][]+\]:/ { exit }
            found                   { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          # Drop leading blank lines (the blank after the heading).
          sed -i -e '/./,$!d' RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "no CHANGELOG.md section for $VERSION — add one before releasing" >&2
            exit 1
          fi
          echo "Release notes for $VERSION:"; echo "---"; cat RELEASE_NOTES.md
      - name: Stage the draft release
        # A SINGLE softprops call with every asset → exactly one draft at tag
        # `v<version>`, targeting the built commit. The tag ref is not created
        # until the draft is published (by you, in the UI). The body is the
        # curated CHANGELOG section (body_path), not auto-generated notes.
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          draft: true
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ github.sha }}
          body_path: RELEASE_NOTES.md
          fail_on_unmatched_files: true
          files: |
            dist/acetone-*.tar.gz
            dist/acetone-*.tar.gz.sha256
