name: Release

# Stage a release CANDIDATE. This builds the single static `acetone` binary for
# each supported target and attaches the archives to a *draft* GitHub release
# named for the version in the workspace `Cargo.toml`.
#
# Approval = publishing the draft. The tag `v<version>` is NOT created here;
# GitHub creates it when you publish the draft release, with you as the actor
# (which satisfies the tag-protection ruleset). There is no manual tagging.
#
# Run this from the Actions tab (workflow_dispatch) when a candidate is wanted;
# review the draft's binaries; publish when happy. The Homebrew formula bump is
# a separate workflow triggered by `release: published`.
#
# Publishing the library crates to crates.io is a separate, deliberate manual
# step (see docs/RELEASING.md) — it reserves names irreversibly.
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - id: v
        # The workspace version is the first top-level `version = "…"` in the
        # root Cargo.toml (under [workspace.package]); the binary inherits it.
        run: |
          version=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          if [ -z "$version" ]; then echo "could not resolve version" >&2; exit 1; fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "Resolved release version: v$version"

  binary:
    name: ${{ matrix.target }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write # attach archives to the draft release
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: statically linked against musl — a self-contained binary.
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
          # macOS: the platform binary (fully static is not supported on macOS).
          - os: macos-latest # Apple silicon runner
            target: aarch64-apple-darwin
          - os: macos-13 # last Intel macOS runner
            target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - name: Install cross-linker (musl)
        if: contains(matrix.target, 'linux-musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-musl" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          fi
      - name: Build release binary
        run: cargo build --release --locked --bin acetone --target ${{ matrix.target }}
      - name: Package
        # Values are passed through the environment and referenced as bash
        # variables — never interpolated into the script text — so nothing
        # crafted can inject shell.
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          TARGET: ${{ matrix.target }}
        run: |
          staging="acetone-${TAG}-${TARGET}"
          mkdir "$staging"
          cp "target/${TARGET}/release/acetone" "$staging/"
          cp README.md LICENSE-MIT LICENSE-APACHE "$staging/" 2>/dev/null || true
          # Archive the *contents* (binary at the root) so the Homebrew formula
          # is a plain `bin.install "acetone"`.
          tar -C "$staging" -czf "$staging.tar.gz" .
          shasum -a 256 "$staging.tar.gz" > "$staging.tar.gz.sha256"
      - name: Attach to the draft release
        # Upserts a DRAFT release at tag `v<version>`, targeting this exact
        # commit. The tag ref is not created until the draft is published.
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.0.8
        with:
          draft: true
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            acetone-*.tar.gz
            acetone-*.tar.gz.sha256
