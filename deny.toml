# cargo-deny configuration — advisories, licences, sources and duplicate bans
# run locally with: cargo deny check

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
# Workspace crates are licensed (MIT OR Apache-2.0, ADR-0003) and checked
# like any other crate despite publish = false.
private = { ignore = false }
# Additions require a justification in the PR per CLAUDE.md's dependency rule.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Versionless path deps between workspace crates are not registry wildcards.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
