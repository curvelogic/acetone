[workspace]
resolver = "3"
# Throwaway spike code (Phase 0) is deliberately excluded from the workspace
# so it never gates the main build/CI. Run its tests from within its directory.
exclude = ["spikes/prolly-git-spike"]
members = [
    "crates/acetone-store",
    "crates/acetone-prolly",
    "crates/acetone-model",
    "crates/acetone-graph",
    "crates/acetone-cypher",
    "crates/acetone-cli",
]

[workspace.package]
version = "0.0.1"
edition = "2024"
publish = false
license = "MIT OR Apache-2.0"
rust-version = "1.96"
repository = "https://github.com/curvelogic/acetone"

[workspace.dependencies]
acetone-store = { path = "crates/acetone-store" }
acetone-prolly = { path = "crates/acetone-prolly" }
acetone-model = { path = "crates/acetone-model" }
acetone-graph = { path = "crates/acetone-graph" }
acetone-cypher = { path = "crates/acetone-cypher" }
